<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner de Drops — Palworld</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#141a10;
  --bg-alt:#1a2114;
  --panel:#20281a;
  --panel-alt:#283321;
  --border:#3a4530;
  --border-bright:#4c5a3d;
  --tan:#e7dcc0;
  --text-dim:#9aa48a;
  --brass:#c98a3e;
  --brass-bright:#e3a85c;
  --rust:#8a4a2b;

  --rar-comum:#9aa0a6;
  --rar-incomum:#5fae5a;
  --rar-raro:#4f8ff0;
  --rar-epico:#a56bff;
  --rar-lendario:#f0b429;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}

body{
  background:
    radial-gradient(ellipse at top left, rgba(201,138,62,0.06), transparent 55%),
    var(--bg);
  color:var(--tan);
  font-family:'IBM Plex Sans', sans-serif;
  min-height:100vh;
  padding:28px 16px 60px;
}

.wrap{max-width:720px;margin:0 auto;}

/* ---------- Header ---------- */
.header{
  border:1px solid var(--border);
  background:linear-gradient(180deg, var(--panel-alt), var(--panel));
  border-radius:6px;
  padding:18px 20px;
  position:relative;
  overflow:hidden;
  margin-bottom:18px;
}
.header::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;height:4px;
  background:repeating-linear-gradient(135deg, var(--brass) 0 10px, var(--rust) 10px 20px);
  opacity:0.55;
}
.eyebrow{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  letter-spacing:0.12em;
  color:var(--brass-bright);
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:6px;
}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:#6fd66f;
  box-shadow:0 0 6px #6fd66f;
  animation:pulse 2s ease-in-out infinite;
}
.dot.dot-off{ background:#a6753a; box-shadow:0 0 6px #a6753a; }
@media (prefers-reduced-motion: reduce){ .dot{animation:none;} }
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
h1{
  font-family:'Oswald', sans-serif;
  font-weight:700;
  letter-spacing:0.02em;
  text-transform:uppercase;
  font-size:26px;
  margin:0 0 4px;
}
.subtitle{color:var(--text-dim);font-size:13.5px;line-height:1.5;max-width:52ch;}

/* ---------- Search terminal ---------- */
.terminal{
  border:1px solid var(--border);
  background:var(--panel);
  border-radius:6px;
  padding:18px;
  margin-bottom:18px;
  position:relative;
  overflow:visible;
}
.terminal.scanning::after{
  content:"";
  position:absolute;
  left:0;right:0;top:0;height:2px;
  background:linear-gradient(90deg, transparent, var(--brass-bright), transparent);
  animation:scanline 1.3s linear infinite;
}
@keyframes scanline{
  0%{transform:translateY(0);}
  100%{transform:translateY(70px);}
}
@media (prefers-reduced-motion: reduce){ .terminal.scanning::after{animation:none; opacity:0.4;} }

.field-label{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--text-dim);
  margin-bottom:8px;
}

.search-row{display:flex;gap:8px;position:relative;}
input[type=text]{
  flex:1;
  background:var(--bg-alt);
  border:1px solid var(--border);
  color:var(--tan);
  font-family:'IBM Plex Mono', monospace;
  font-size:14px;
  padding:11px 12px;
  border-radius:4px;
  outline:none;
  width:100%;
}
input[type=text]:disabled{opacity:0.5;}
input[type=text]:focus-visible{
  border-color:var(--brass-bright);
  box-shadow:0 0 0 2px rgba(227,168,92,0.25);
}
input[type=text]::placeholder{color:#6c765a;}

button{
  font-family:'IBM Plex Mono', monospace;
  font-weight:600;
  font-size:13px;
  letter-spacing:0.02em;
  border-radius:4px;
  border:1px solid var(--border);
  cursor:pointer;
  padding:11px 16px;
  transition:background 0.15s, border-color 0.15s, transform 0.05s;
  white-space:nowrap;
}
button:active{transform:translateY(1px);}
button:focus-visible{outline:2px solid var(--brass-bright);outline-offset:2px;}

.btn-primary{
  background:var(--brass);
  border-color:var(--brass);
  color:#1a1206;
}
.btn-primary:hover{background:var(--brass-bright);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;}

.btn-ghost{
  background:transparent;
  color:var(--tan);
}
.btn-ghost:hover{border-color:var(--border-bright); background:var(--panel-alt);}

/* Autocomplete dropdown */
.suggest-box{
  position:absolute;
  top:calc(100% + 4px);
  left:0;
  right:96px;
  background:var(--bg-alt);
  border:1px solid var(--border-bright);
  border-radius:4px;
  z-index:20;
  max-height:240px;
  overflow-y:auto;
  display:none;
}
.suggest-box.open{display:block;}
.suggest-item{
  padding:9px 12px;
  font-family:'IBM Plex Mono', monospace;
  font-size:13px;
  cursor:pointer;
  border-bottom:1px solid var(--border);
}
.suggest-item:last-child{border-bottom:none;}
.suggest-item:hover, .suggest-item.active{background:var(--panel-alt); color:var(--brass-bright);}

.status-line{
  font-family:'IBM Plex Mono', monospace;
  font-size:11.5px;
  color:var(--text-dim);
  margin-top:10px;
}

/* ---------- History chips ---------- */
.history{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.chip{
  font-family:'IBM Plex Mono', monospace;
  font-size:11.5px;
  padding:5px 10px;
  border:1px solid var(--border);
  border-radius:20px;
  background:var(--panel);
  color:var(--text-dim);
  cursor:pointer;
}
.chip:hover{border-color:var(--brass-bright);color:var(--tan);}

/* ---------- Results ---------- */
.results-head{
  display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;
  margin:6px 2px 12px;
}
.results-head h2{
  font-family:'Oswald', sans-serif;text-transform:uppercase;font-size:16px;
  letter-spacing:0.03em;margin:0;font-weight:600;
}
.meta-note{font-family:'IBM Plex Mono', monospace;font-size:11px;color:var(--text-dim);}

.source-note{
  font-size:13px;color:var(--text-dim);
  border-left:2px solid var(--border);
  padding-left:10px;margin:0 0 16px;line-height:1.5;
}
.source-note a{color:var(--brass-bright);}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-left-width:4px;
  border-radius:5px;
  padding:14px 16px;
  margin-bottom:10px;
}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.pal-name{
  font-family:'Oswald', sans-serif;font-size:17px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.01em;
}
.badges{display:flex;gap:6px;flex-wrap:wrap;}
.badge{
  font-family:'IBM Plex Mono', monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;
  padding:2px 8px;border-radius:3px;border:1px solid currentColor;
}
.stats-row{
  display:flex;gap:22px;margin-top:10px;font-family:'IBM Plex Mono', monospace;
}
.stat-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;display:block;}
.stat-value{font-size:15px;color:var(--brass-bright);font-weight:600;}
.how-to{font-size:13px;line-height:1.6;margin-top:10px;color:var(--tan);}
.how-to b{color:var(--brass-bright);font-weight:600;}
.how-to .spawn-loading{color:var(--text-dim);font-style:italic;}

.empty, .error, .loading{
  text-align:center;color:var(--text-dim);font-size:13.5px;padding:30px 10px;
}
.error{color:#e08a6e;}

.footer-note{
  text-align:center;font-size:11.5px;color:var(--text-dim);margin-top:24px;
  font-family:'IBM Plex Mono', monospace;
  line-height:1.6;
}
.footer-note a{color:var(--brass-bright);}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="eyebrow"><span class="dot" id="statusDot"></span> <span id="statusText">CARREGANDO BANCO DE DADOS...</span></div>
    <h1>Scanner de Drops</h1>
    <div class="subtitle">Digite o nome de um item pra ver quais Pals dropam ele, quanto, com que chance — e como conseguir aquele Pal. 100% offline depois de carregar, sem chave de API.</div>
  </div>

  <div class="terminal scanning" id="terminal">
    <div class="field-label">Nome do item</div>
    <div class="search-row">
      <input type="text" id="itemInput" placeholder="carregando..." autocomplete="off" disabled>
      <button class="btn-primary" id="searchBtn" disabled>Escanear</button>
      <div class="suggest-box" id="suggestBox"></div>
    </div>
    <div class="status-line" id="statusLine">Baixando dados de Pals e itens...</div>
  </div>

  <div class="history" id="historyRow"></div>

  <div id="output"></div>

  <div class="footer-note" id="footerNote"></div>

</div>

<script>
const PALDEX_PALS_URL = 'https://raw.githubusercontent.com/blaynem/paldex/main/data-provider/baked-data/pt-BR/pals.json';
const PALDEX_MAPPINGS_URL = 'https://raw.githubusercontent.com/blaynem/paldex/main/data-provider/baked-data/pt-BR/item_name_mappings.json';
const PALDEX_MAPLOC_BASE = 'https://raw.githubusercontent.com/blaynem/paldex/main/data-provider/baked-data/map_locations/';
const PALCALC_DB_URL = 'https://raw.githubusercontent.com/tylercamp/palcalc/main/PalCalc.Model/db.json';
const PALWORLD_GG_SEARCH = 'https://palworld.gg/?s=';

const ELEMENT_COLORS = {
  'Fogo':'#e2572b','Água':'#3b82c4','Grama':'#4f9d4a','Elétrico':'#e8c94a',
  'Gelo':'#7fd8e0','Terra':'#a9743b','Escuridão':'#7a5ea8','Dracônico':'#5a4fcf','Não elemental':'#9aa0a6'
};
const RARITY_ORDER = ['Comum','Incomum','Raro','Épico','Lendário'];
const RARITY_COLORS = {
  'Comum':'var(--rar-comum)','Incomum':'var(--rar-incomum)','Raro':'var(--rar-raro)',
  'Épico':'var(--rar-epico)','Lendário':'var(--rar-lendario)'
};

function rarityTier(r){
  if (r >= 20) return 'Lendário';
  if (r >= 7) return 'Épico';
  if (r >= 4) return 'Raro';
  if (r >= 2) return 'Incomum';
  return 'Comum';
}

function normalize(str){
  return (str || '').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
}

// --- DOM refs ---
const terminal = document.getElementById('terminal');
const output = document.getElementById('output');
const itemInput = document.getElementById('itemInput');
const searchBtn = document.getElementById('searchBtn');
const suggestBox = document.getElementById('suggestBox');
const statusLine = document.getElementById('statusLine');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const historyRow = document.getElementById('historyRow');
const footerNote = document.getElementById('footerNote');

// --- Dataset state ---
let dropIndex = {};          // itemDisplayName (pt-BR) -> [{palName, palDevName, element, rarityTier, min, max, rate}]
let allItemNamesSet = new Set(); // every known item display name (droppable or not) for "did you mean"
let droppableItemNames = []; // sorted list of item display names that DO have droppers (for autocomplete)
let levelRanges = {};        // palDevName -> {min, max}
let datasetReady = false;

async function fetchJson(url){
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status + ' em ' + url);
  return res.json();
}

async function loadDataset(){
  try{
    const [pals, mappings, palcalc] = await Promise.all([
      fetchJson(PALDEX_PALS_URL),
      fetchJson(PALDEX_MAPPINGS_URL),
      fetchJson(PALCALC_DB_URL).catch(() => null) // enrichment only, non-fatal if it fails
    ]);

    const devToItem = mappings.dev_name_to_item || {};

    // Level ranges (fresh roster) — matched later by InternalName
    if (palcalc && Array.isArray(palcalc.Pals)){
      palcalc.Pals.forEach(p => {
        if (p.InternalName){
          levelRanges[p.InternalName] = { min: p.MinWildLevel, max: p.MaxWildLevel };
        }
      });
    }

    // Build drop index from pals.json
    pals.forEach(pal => {
      if (!pal.item_drops || pal.item_drops.length === 0) return;
      const element = (pal.elements && pal.elements[0]) || 'Não elemental';
      const tier = rarityTier(pal.rarity || 0);
      pal.item_drops.forEach(drop => {
        let displayName = devToItem[drop.item_name] || drop.item_name;
        if (!displayName || displayName === 'pt-BR_Text') displayName = drop.item_name;
        if (!dropIndex[displayName]) dropIndex[displayName] = [];
        dropIndex[displayName].push({
          palName: pal.pal_name,
          palDevName: pal.pal_dev_name,
          element,
          rarityTier: tier,
          min: drop.min_drop,
          max: drop.max_drop,
          rate: drop.drop_rate
        });
      });
    });

    droppableItemNames = Object.keys(dropIndex).sort((a,b) => a.localeCompare(b, 'pt-BR'));

    // Full item universe (for "existe mas não é drop" detection)
    Object.keys(mappings.item_to_dev_name || {}).forEach(name => allItemNamesSet.add(name));
    droppableItemNames.forEach(name => allItemNamesSet.add(name));

    datasetReady = true;
    onDatasetReady();

  }catch(err){
    onDatasetError(err);
  }
}

function onDatasetReady(){
  statusDot.classList.remove('dot-off');
  statusText.textContent = 'PRONTO · ' + droppableItemNames.length + ' ITENS COM DROP CONHECIDO';
  terminal.classList.remove('scanning');
  statusLine.textContent = 'Dados carregados direto do GitHub (comunidade blaynem/paldex + tylercamp/palcalc). Busque um item abaixo.';
  itemInput.disabled = false;
  itemInput.placeholder = 'ex: Lã, Couro, Chifre, Fibra de Carbono...';
  searchBtn.disabled = false;
  itemInput.focus();
  footerNote.innerHTML = 'Dados extraídos direto dos arquivos do jogo por projetos open source, sem chave de API. ' +
    'Aviso honesto: a base de itens/drops (blaynem/paldex) não é atualizada desde o início de 2024 — itens bem recentes ' +
    '(ex: da atualização Feybreak) podem não aparecer aqui ainda. Se não encontrar, ' +
    '<a href="' + PALWORLD_GG_SEARCH + '" target="_blank" rel="noopener">busque direto no palworld.gg</a>.';
  renderHistory();
}

function onDatasetError(err){
  terminal.classList.remove('scanning');
  statusDot.classList.add('dot-off');
  statusText.textContent = 'FALHA AO CARREGAR DADOS';
  statusLine.innerHTML = 'Não consegui baixar a base de dados do GitHub (' + escapeHtml(err.message || 'erro desconhecido') +
    '). Verifique sua conexão e <button class="btn-ghost" id="retryBtn" style="padding:2px 8px;font-size:11px;">tente de novo</button>.';
  const retryBtn = document.getElementById('retryBtn');
  if (retryBtn) retryBtn.addEventListener('click', () => location.reload());
  footerNote.innerHTML = 'Enquanto isso, você pode consultar direto em <a href="https://palworld.gg" target="_blank" rel="noopener">palworld.gg</a>.';
}

loadDataset();

// --- Autocomplete ---
let activeSuggestIndex = -1;

itemInput.addEventListener('input', () => {
  const q = normalize(itemInput.value);
  activeSuggestIndex = -1;
  if (!q){ closeSuggestions(); return; }
  const matches = droppableItemNames.filter(name => normalize(name).includes(q)).slice(0, 8);
  renderSuggestions(matches);
});

itemInput.addEventListener('keydown', (e) => {
  const items = suggestBox.querySelectorAll('.suggest-item');
  if (e.key === 'ArrowDown' && items.length){
    e.preventDefault();
    activeSuggestIndex = Math.min(activeSuggestIndex + 1, items.length - 1);
    updateActiveSuggestion(items);
  } else if (e.key === 'ArrowUp' && items.length){
    e.preventDefault();
    activeSuggestIndex = Math.max(activeSuggestIndex - 1, 0);
    updateActiveSuggestion(items);
  } else if (e.key === 'Enter'){
    if (activeSuggestIndex >= 0 && items[activeSuggestIndex]){
      itemInput.value = items[activeSuggestIndex].textContent;
    }
    closeSuggestions();
    runScan(itemInput.value);
  } else if (e.key === 'Escape'){
    closeSuggestions();
  }
});

document.addEventListener('click', (e) => {
  if (!suggestBox.contains(e.target) && e.target !== itemInput) closeSuggestions();
});

function renderSuggestions(matches){
  if (matches.length === 0){ closeSuggestions(); return; }
  suggestBox.innerHTML = matches.map(name => `<div class="suggest-item">${escapeHtml(name)}</div>`).join('');
  suggestBox.classList.add('open');
  suggestBox.querySelectorAll('.suggest-item').forEach(el => {
    el.addEventListener('click', () => {
      itemInput.value = el.textContent;
      closeSuggestions();
      runScan(itemInput.value);
    });
  });
}
function updateActiveSuggestion(items){
  items.forEach((el, i) => el.classList.toggle('active', i === activeSuggestIndex));
  if (items[activeSuggestIndex]) items[activeSuggestIndex].scrollIntoView({block:'nearest'});
}
function closeSuggestions(){
  suggestBox.classList.remove('open');
  suggestBox.innerHTML = '';
  activeSuggestIndex = -1;
}

searchBtn.addEventListener('click', () => runScan(itemInput.value));

// --- Search + render ---
function runScan(rawQuery){
  if (!datasetReady) return;
  currentRenderId++;
  const query = (rawQuery || '').trim();
  if (!query){
    output.innerHTML = `<div class="error">Digite um item antes de escanear.</div>`;
    return;
  }
  closeSuggestions();
  const nq = normalize(query);

  // 1. exact match
  let matchedName = droppableItemNames.find(name => normalize(name) === nq);

  // 2. substring match (either direction)
  if (!matchedName){
    const candidates = droppableItemNames.filter(name => normalize(name).includes(nq) || nq.includes(normalize(name)));
    if (candidates.length === 1) matchedName = candidates[0];
    else if (candidates.length > 1){
      renderMultipleMatches(query, candidates);
      saveHistory(query);
      return;
    }
  }

  if (matchedName){
    renderResults(matchedName, dropIndex[matchedName]);
    saveHistory(matchedName);
    return;
  }

  // 3. exists in full item universe but has no droppers (craftable/bought/gathered only)
  const existsButNoDrop = [...allItemNamesSet].find(name => normalize(name) === nq);
  if (existsButNoDrop){
    renderNoDrops(existsButNoDrop);
    saveHistory(query);
    return;
  }

  // 4. nothing found — suggest closest + manual fallback
  renderNotFound(query);
  saveHistory(query);
}

function renderMultipleMatches(query, candidates){
  let html = `
    <div class="results-head"><h2>Vários itens encontrados</h2></div>
    <div class="source-note">Sua busca por "${escapeHtml(query)}" bateu com mais de um item. Escolha um:</div>
  `;
  candidates.slice(0, 12).forEach(name => {
    html += `<div class="chip" style="display:inline-block;margin:4px 6px 4px 0;" data-name="${escapeHtml(name)}">${escapeHtml(name)}</div>`;
  });
  output.innerHTML = html;
  output.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      itemInput.value = el.dataset.name;
      runScan(el.dataset.name);
    });
  });
}

function renderNoDrops(itemName){
  output.innerHTML = `
    <div class="results-head"><h2>${escapeHtml(itemName)}</h2></div>
    <div class="empty">Esse item existe, mas nenhum Pal dropa ele — provavelmente é craftável, comprado com mercador, ou coletado (minério, planta, baú). Não é um drop de abate.</div>
  `;
}

function renderNotFound(query){
  const nq = normalize(query);
  const scored = droppableItemNames
    .map(name => ({ name, score: similarityScore(nq, normalize(name)) }))
    .filter(x => x.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0, 5);

  let html = `
    <div class="results-head"><h2>${escapeHtml(query)}</h2></div>
    <div class="empty">
      Não achei esse item na base local — pode ser um nome digitado diferente, ou algo bem recente que a base ainda não tem (ver aviso no rodapé).
      <br><br>
      <a href="${PALWORLD_GG_SEARCH}${encodeURIComponent(query)}" target="_blank" rel="noopener" style="color:var(--brass-bright);">Buscar "${escapeHtml(query)}" direto no palworld.gg →</a>
    </div>
  `;
  if (scored.length){
    html += `<div class="source-note">Você quis dizer:</div>`;
    scored.forEach(s => {
      html += `<div class="chip" style="display:inline-block;margin:4px 6px 4px 0;" data-name="${escapeHtml(s.name)}">${escapeHtml(s.name)}</div>`;
    });
  }
  output.innerHTML = html;
  output.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      itemInput.value = el.dataset.name;
      runScan(el.dataset.name);
    });
  });
}

function similarityScore(a, b){
  // cheap token/substring overlap score, not a full edit-distance — good enough for suggestions
  if (b.includes(a) || a.includes(b)) return 10 + Math.min(a.length, b.length);
  const aTokens = a.split(/\s+/).filter(t => t.length > 2);
  let score = 0;
  aTokens.forEach(t => { if (b.includes(t)) score += t.length; });
  return score;
}

const mapLocationCache = {};
async function fetchSpawnInfo(palDevName){
  if (mapLocationCache[palDevName]) return mapLocationCache[palDevName];
  try{
    const data = await fetchJson(PALDEX_MAPLOC_BASE + encodeURIComponent(palDevName) + '.json');
    const day = (data.dayTimeLocations && data.dayTimeLocations.locations) || [];
    const night = (data.nightTimeLocations && data.nightTimeLocations.locations) || [];
    let when;
    if (day.length && night.length) when = 'dia e à noite';
    else if (night.length) when = 'só à noite';
    else if (day.length) when = 'só de dia';
    else when = null;
    const total = day.length + night.length;
    const info = when ? { when, total } : null;
    mapLocationCache[palDevName] = info;
    return info;
  }catch(e){
    mapLocationCache[palDevName] = null;
    return null;
  }
}

let currentRenderId = 0;
function renderResults(itemName, drops){
  const renderId = ++currentRenderId;
  // sort: 100% rate first, then by rarity (common first = easier to get)
  const rarityRank = r => RARITY_ORDER.indexOf(r);
  const sorted = [...drops].sort((a,b) => (b.rate - a.rate) || (rarityRank(a.rarityTier) - rarityRank(b.rarityTier)));

  let html = `
    <div class="results-head">
      <h2>${escapeHtml(itemName)}</h2>
      <span class="meta-note">${sorted.length} Pal${sorted.length > 1 ? 's' : ''} encontrado${sorted.length > 1 ? 's' : ''}</span>
    </div>
  `;

  sorted.forEach((d, i) => {
    const elColor = ELEMENT_COLORS[d.element] || '#9aa0a6';
    const rarColor = RARITY_COLORS[d.rarityTier] || 'var(--rar-comum)';
    const qty = d.min === d.max ? String(d.min) : `${d.min}-${d.max}`;
    const level = levelRanges[d.palDevName];
    const levelText = level && (level.min || level.max) ? `Nível ${level.min}–${level.max}` : null;

    html += `
      <div class="card" style="border-left-color:${elColor}" data-pal-dev="${escapeHtml(d.palDevName)}" data-idx="${i}">
        <div class="card-top">
          <div class="pal-name">${escapeHtml(d.palName)}</div>
          <div class="badges">
            <span class="badge" style="color:${elColor}">${escapeHtml(d.element)}</span>
            <span class="badge" style="color:${rarColor}">${escapeHtml(d.rarityTier)}</span>
          </div>
        </div>
        <div class="stats-row">
          <div><span class="stat-label">Quantidade</span><span class="stat-value">${escapeHtml(qty)}</span></div>
          <div><span class="stat-label">Chance</span><span class="stat-value">${escapeHtml(String(d.rate))}%</span></div>
        </div>
        <div class="how-to">
          <b>Como conseguir:</b>
          ${levelText ? escapeHtml(levelText) + ' · ' : ''}
          <span class="spawn-slot spawn-loading">consultando pontos de spawn...</span>
        </div>
      </div>
    `;
  });

  output.innerHTML = html;

  // progressively fill in spawn info per card
  sorted.forEach((d, i) => {
    fetchSpawnInfo(d.palDevName).then(info => {
      if (renderId !== currentRenderId) return;
      const card = output.querySelector(`.card[data-idx="${i}"]`);
      if (!card) return;
      const slot = card.querySelector('.spawn-slot');
      if (!slot) return;
      if (info){
        slot.textContent = `Aparece ${info.when} (${info.total} pontos conhecidos no mapa)`;
      } else {
        slot.textContent = 'Sem dados de spawn no mapa (pode ser obtido só por raid, expedição ou baú)';
      }
      slot.classList.remove('spawn-loading');
    });
  });
}

// --- History (small, local only) ---
async function saveHistory(name){
  try{
    let hist = [];
    try{
      const stored = await window.storage.get('history', false);
      if (stored && stored.value) hist = JSON.parse(stored.value);
    }catch(e){ hist = []; }
    hist = hist.filter(h => h !== name);
    hist.unshift(name);
    hist = hist.slice(0, 12);
    await window.storage.set('history', JSON.stringify(hist), false);
    renderHistory(hist);
  }catch(e){ /* storage best-effort, ignore */ }
}

async function renderHistory(preloaded){
  try{
    let hist = preloaded;
    if (!hist){
      const stored = await window.storage.get('history', false);
      hist = stored && stored.value ? JSON.parse(stored.value) : [];
    }
    historyRow.innerHTML = '';
    hist.forEach(name => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = name;
      chip.addEventListener('click', () => {
        itemInput.value = name;
        runScan(name);
      });
      historyRow.appendChild(chip);
    });
  }catch(e){ /* no history yet, ignore */ }
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}
</script>
